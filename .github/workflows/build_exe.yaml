name: Compile Windows Executable

on:
  push:
    branches: [ main, master ] # Triggers whenever you push changes to main or master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest # Allocates a native Windows cloud machine to assemble your program

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ETL Application Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas seaborn matplotlib openpyxl pyinstaller jinja2

    - name: Compile Code into Standalone Executable
      run: |
        pyinstaller --onefile --noconsole iready_etl.py

    - name: Archive Built Output Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: iReady-ETL-Windows-Tool
        path: dist/iready_etl.exe